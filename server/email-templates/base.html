<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f5f5f5;
        }
        
        .email-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
        }
        
        /* Header */
        .email-header {
            background: linear-gradient(135deg, #0066cc 0%, #0052a3 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }
        
        .email-header .logo {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .email-header .logo-icon {
            width: 32px;
            height: 32px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        
        /* Main Content */
        .email-content {
            padding: 40px 30px;
        }
        
        .email-content h1 {
            font-size: 24px;
            color: #0066cc;
            margin-bottom: 15px;
        }
        
        .email-content h2 {
            font-size: 18px;
            color: #333;
            margin-top: 25px;
            margin-bottom: 12px;
        }
        
        .email-content p {
            margin-bottom: 15px;
            color: #555;
        }
        
        /* Info Box */
        .info-box {
            background-color: #f8f9fa;
            border-left: 4px solid #0066cc;
            padding: 15px;
            margin: 20px 0;
            border-radius: 4px;
        }
        
        .info-box-title {
            font-weight: bold;
            color: #0066cc;
            margin-bottom: 8px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .info-box-content {
            color: #555;
            font-size: 14px;
        }
        
        /* Customer Details */
        .customer-details {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 6px;
            margin: 20px 0;
        }
        
        .customer-details h3 {
            font-size: 14px;
            color: #0066cc;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            font-weight: bold;
        }
        
        .customer-detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
            font-size: 14px;
        }
        
        .customer-detail-row:last-child {
            border-bottom: none;
        }
        
        .customer-detail-label {
            font-weight: 600;
            color: #333;
            min-width: 120px;
        }
        
        .customer-detail-value {
            color: #555;
            text-align: right;
            flex: 1;
        }
        
        /* Action Button */
        .action-button-container {
            text-align: center;
            margin: 30px 0;
        }
        
        .action-button {
            display: inline-block;
            background-color: #0066cc;
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            transition: background-color 0.3s ease;
            border: 2px solid #0066cc;
        }
        
        .action-button:hover {
            background-color: #0052a3;
            border-color: #0052a3;
        }
        
        .action-button.secondary {
            background-color: transparent;
            color: #0066cc;
            margin-left: 10px;
        }
        
        .action-button.secondary:hover {
            background-color: #f0f5ff;
        }
        
        .action-button.success {
            background-color: #28a745;
            border-color: #28a745;
        }
        
        .action-button.success:hover {
            background-color: #218838;
            border-color: #218838;
        }
        
        .action-button.warning {
            background-color: #ffc107;
            color: #333;
            border-color: #ffc107;
        }
        
        .action-button.warning:hover {
            background-color: #e0a800;
            border-color: #e0a800;
        }
        
        /* Quick Actions */
        .quick-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 25px 0;
            flex-wrap: wrap;
        }
        
        .quick-action-btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: #f0f5ff;
            color: #0066cc;
            text-decoration: none;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid #0066cc;
            transition: all 0.3s ease;
        }
        
        .quick-action-btn:hover {
            background-color: #0066cc;
            color: white;
        }
        
        /* Divider */
        .divider {
            height: 1px;
            background-color: #e0e0e0;
            margin: 30px 0;
        }
        
        /* Footer */
        .email-footer {
            background-color: #f8f9fa;
            padding: 30px;
            text-align: center;
            border-top: 1px solid #e0e0e0;
            font-size: 12px;
            color: #666;
        }
        
        .email-footer p {
            margin-bottom: 10px;
        }
        
        .email-footer a {
            color: #0066cc;
            text-decoration: none;
        }
        
        .email-footer a:hover {
            text-decoration: underline;
        }
        
        .footer-links {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }
        
        .footer-links a {
            margin: 0 10px;
            display: inline-block;
        }
        
        /* Badge */
        .badge {
            display: inline-block;
            padding: 4px 12px;
            background-color: #e3f2fd;
            color: #0066cc;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .badge.success {
            background-color: #e8f5e9;
            color: #28a745;
        }
        
        .badge.warning {
            background-color: #fff3e0;
            color: #ff9800;
        }
        
        .badge.danger {
            background-color: #ffebee;
            color: #dc3545;
        }
        
        /* Responsive */
        @media (max-width: 600px) {
            .email-container {
                width: 100%;
            }
            
            .email-content {
                padding: 20px 15px;
            }
            
            .email-header {
                padding: 20px 15px;
            }
            
            .email-footer {
                padding: 20px 15px;
            }
            
            .customer-detail-row {
                flex-direction: column;
            }
            
            .customer-detail-label {
                margin-bottom: 4px;
            }
            
            .customer-detail-value {
                text-align: left;
            }
            
            .quick-actions {
                flex-direction: column;
            }
            
            .quick-action-btn {
                width: 100%;
                text-align: center;
            }
            
            .action-button {
                display: block;
                width: 100%;
                margin-bottom: 10px;
            }
            
            .action-button.secondary {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <div class="email-container">
        <!-- Header -->
        <div class="email-header">
            <div class="logo">
                <div class="logo-icon">✈️</div>
                <span>Pikme</span>
            </div>
        </div>
        
        <!-- Content -->
        <div class="email-content">
            {{content}}
        </div>
        
        <!-- Footer -->
        <div class="email-footer">
            <p>© 2026 Pikme. All rights reserved.</p>
            <p>You're receiving this email because you're a team member at Pikme.</p>
            <div class="footer-links">
                <a href="{{appUrl}}/settings/notifications">Notification Settings</a>
                <a href="{{appUrl}}/help">Help Center</a>
                <a href="{{appUrl}}/contact">Contact Support</a>
            </div>
        </div>
    </div>
</body>
</html>
